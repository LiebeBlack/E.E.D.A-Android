# Directorios de almacenamiento (Estándar de Android)
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists

# URL actualizada a la versión 9.3.1
# Nota: Se usa '-all' si planeas depurar scripts de Gradle complejos para tu juego, 
# de lo contrario '-bin' es suficiente.
distributionUrl=https\://services.gradle.org/distributions/Gradle-9.3.1-bin.zip

# Optimización para red: permite descargas paralelas de dependencias
systemProp.org.gradle.parallel=true
systemProp.org.gradle.caching=true
